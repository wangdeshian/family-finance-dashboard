<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>請好好記帳 - 排序小計版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f4f6f8; margin: 0; padding: 8px; color: #333; overflow-x: hidden; width: 100vw; }
        .dashboard-container { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 12px; display: flex; flex-direction: column; }
        .card-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; border-bottom: 2px solid #f0f2f5; padding-bottom: 6px; color: #1a73e8; }
        
        .top-bar { background: #34495e; color: white; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; z-index: 100; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .month-nav { display: flex; align-items: center; gap: 4px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .month-select-style { padding: 5px; border-radius: 6px; border: none; font-size: 0.85rem; background: #fff; color: #333; font-weight: bold; }
        .save-target-row { display: flex; align-items: center; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; gap: 8px; justify-content: center; }
        .save-input { width: 100px; background: #fff; border: none; border-radius: 4px; padding: 4px 8px; font-weight: bold; text-align: right; color: #2c3e50; }

        .form-section { border-top: 5px solid #1a73e8; }
        .form-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 120px; }
        .form-group label { font-size: 0.7rem; font-weight: bold; color: #888; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; height: 40px; appearance: none; background-color: #fff; }
        .submit-btn { background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; height: 42px; width: 100%; margin-top: 5px; font-size: 0.95rem; }

        .middle-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        
        /* 拖拽與合計樣式 */
        .item-list { display: flex; flex-direction: column; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #eee; width: 100%; gap: 4px; background: #fff; }
        .handle { color: #ccc; cursor: grab; padding: 0 4px; font-size: 1.1rem; }
        .handle:active { cursor: grabbing; }
        
        .subtotal-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 0.75rem; color: #777; background: #fcfcfc; font-weight: bold; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .subtotal-label { padding-left: 28px; } /* 對齊 handle 的寬度 */
        
        .name-area { display: flex; align-items: center; flex: 1; min-width: 0; gap: 2px; } 
        .cat-name-input { border: none; background: transparent; font-weight: bold; font-size: 0.85rem; width: 100%; color: #555; outline: none; }
        .val-container { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
        .input-box { width: 60px; border: 1px solid #e0e0e0; text-align: right; font-weight: bold; border-radius: 6px; padding: 4px; font-size: 0.8rem; }
        
        .budget-warning { color: #e74c3c !important; border-color: #ffcdd2 !important; background: #fff5f5 !important; }
        .budget-safe { color: #27ae60 !important; border-color: #c8e6c9 !important; background: #fafffa !important; }
        .actual-input { background: #f8f9fa; color: #333; }
        .item-del-btn { color: #ffbcbc; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; font-weight: bold; padding: 0 4px; }
        .inline-add-box { margin-top: 6px; display: flex; gap: 4px; padding: 4px 0; }
        .inline-add-btn { background: #eee; border: none; border-radius: 6px; padding: 0 10px; cursor: pointer; color: #666; font-weight: bold; }

        .acc-bal { color: #8e44ad; font-size: 1.1rem; border-top: 1px solid #eee; padding-top: 5px; margin-top: 5px; font-weight: bold; }
        .history-table { width:100%; border-collapse:collapse; font-size:0.75rem; }
        @media (max-width: 600px) { .input-box { width: 58px; } }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="top-bar">
            <div class="top-row">
                <strong style="font-size: 0.9rem;">🚀 請好好記帳</strong>
                <div class="month-nav">
                    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                    <select id="monthSelect" class="month-select-style" onchange="currentMonth = this.value; render();"></select>
                    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
            </div>
            <div class="save-target-row">
                <span style="font-size: 0.8rem;">💰 本月存款目標：</span>
                <input type="number" id="saveTargetInput" class="save-input" onfocus="this.select()" onblur="updateSaveTarget(this.value)">
            </div>
        </div>

        <div class="card form-section">
            <div class="card-title">快速流水帳登記</div>
            <form id="mainForm" class="form-grid">
                <div class="form-group"><label>日期</label><input type="date" id="fDate" required></div>
                <div class="form-group"><label>收支</label><select id="fType" onchange="updateCategoryDropdown()"><option value="支出">支出</option><option value="收入">收入</option></select></div>
                <div class="form-group"><label>成員</label><select id="fMember" onchange="updateCategoryDropdown()"></select></div>
                <div class="form-group"><label>分類</label><select id="fCat" required></select></div>
                <div class="form-group"><label>金額</label><input type="number" id="fAmt" onfocus="this.select()" required></div>
                <button type="submit" class="submit-btn">儲存紀錄</button>
            </form>
        </div>

        <div class="middle-section" id="cardsContainer"></div>

        <div class="card" style="margin-top:10px;">
            <div style="display:flex; justify-content: space-around; align-items: center; text-align: center;">
                <div><div style="font-size:0.7rem; color:#888;">預估節餘</div><div id="estBal" style="font-weight:bold; font-size:1.1rem;">0</div></div>
                <div><div style="font-size:0.7rem; color:#888;">實際結餘 (扣存後)</div><div id="actBal" style="font-weight:bold; font-size:1.1rem;">0</div></div>
            </div>
            <div id="accBal" class="acc-bal" style="text-align: center;">NT$ 0</div>
        </div>

        <div class="card" style="min-height: auto;"><div class="card-title" id="historyTitle">流水帳紀錄</div><div style="overflow-x:auto"><table class="history-table"><tbody id="historyTbody"></tbody></table></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, deleteDoc, updateDoc, setDoc, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDiatcf67zBQFDe47O0zQqwk9blNFP3Y7Q",
            authDomain: "family-finance-f4077.firebaseapp.com",
            projectId: "family-finance-f4077",
            storageBucket: "family-finance-f4077.firebasestorage.app",
            messagingSenderId: "533199869020",
            appId: "1:533199869020:web:ea1e55d11f2c643cd44299",
            measurementId: "G-1WEX2WN56Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allData = [], allBudgets = {}, currentMonth = new Date().toISOString().slice(0,7);
        const members = ['共同支出','王得賢','蔡書瑜','王婕恩','王予陽'];
        const defMap = { '王得賢': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] }, '蔡書瑜': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] }, '王婕恩': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] }, '王予陽': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] }, '共同支出': { 收入: ['獎金','利息'], 支出: ['房租','水電瓦斯','第四台','車位租金','其他'] } };

        window.updateCategoryDropdown = () => {
            const m = document.getElementById('fMember').value;
            const t = document.getElementById('fType').value;
            if (!m || !t) return;
            const dynamicCats = Object.values(allBudgets).filter(b => b.member === m && b.type === t && b.isDeleted !== true).map(b => b.category);
            const defaultCats = (defMap[m] && defMap[m][t]) ? defMap[m][t] : [];
            const finalCats = [...new Set([...defaultCats, ...dynamicCats])];
            document.getElementById('fCat').innerHTML = finalCats.map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.deleteCategory = async (member, type, category, ask = true) => {
            if (ask && !confirm(`確定徹底刪除「${category}」？`)) return;
            await setDoc(doc(db, "budgets", `${currentMonth}_${member}_${category}`), { isDeleted: true }, { merge: true });
        };

        window.saveBudget = async (member, type, category, field, value) => {
            const numVal = Math.round(Number(value)) || 0;
            if (field === 'amount' && numVal === 0) {
                await deleteCategory(member, type, category, false);
            } else {
                const updateData = field === 'amount' ? { amount: numVal, isDeleted: false } : { category: value, isDeleted: false };
                await setDoc(doc(db, "budgets", `${currentMonth}_${member}_${category}`), { month: currentMonth, member, type, category, ...updateData }, { merge: true });
            }
        };

        // 【新增：更新排序邏輯】
        window.saveOrder = async (member, type, sortedArray) => {
            const promises = sortedArray.map((cat, index) => {
                return setDoc(doc(db, "budgets", `${currentMonth}_${member}_${cat}`), { order: index }, { merge: true });
            });
            await Promise.all(promises);
        };

        window.saveActualDirect = async (member, type, category, newVal, currentSum) => {
            const val = Math.round(Number(newVal)) || 0;
            if (val === currentSum) return;
            const diff = val - currentSum;
            await addDoc(collection(db, "expenses"), { date: new Date().toISOString().slice(0, 10), type, member, category, amount: diff, timestamp: new Date() });
        };

        window.updateSaveTarget = async (val) => { await setDoc(doc(db, "settings", `${currentMonth}_save`), { month: currentMonth, target: Number(val) || 0 }); };
        window.saveDate = async (id, newDate) => { if (id && newDate) await updateDoc(doc(db, "expenses", id), { date: newDate }); };
        window.delItem = async (id) => { if(confirm("確定刪除？")) await deleteDoc(doc(db, "expenses", id)); };

        window.cardAddProject = async (m, t) => {
            const name = document.getElementById(`cAddCat-${m}-${t}`).value;
            const amt = document.getElementById(`cAddAmt-${m}-${t}`).value;
            if (!name) return;
            await saveBudget(m, t, name, 'amount', amt || 0);
            document.getElementById(`cAddCat-${m}-${t}`).value = '';
            document.getElementById(`cAddAmt-${m}-${t}`).value = '';
        };

        window.changeMonth = (offset) => {
            let [y, m] = currentMonth.split('-').map(Number);
            m += offset; if (m > 12) { y++; m = 1; } if (m < 1) { y--; m = 12; }
            currentMonth = `${y}-${String(m).padStart(2, '0')}`;
            render(); updateMonthSelector();
        };

        const setup = () => {
            onSnapshot(query(collection(db, "budgets")), (snap) => { allBudgets = {}; snap.forEach(d => allBudgets[d.id] = d.data()); render(); updateCategoryDropdown(); });
            onSnapshot(query(collection(db, "expenses"), orderBy("date", "desc")), (snap) => { allData = []; snap.forEach(d => allData.push({ id: d.id, ...d.data() })); updateMonthSelector(); render(); });
            onSnapshot(query(collection(db, "settings")), (snap) => { 
                const s = snap.docs.find(d => d.id === `${currentMonth}_save`)?.data();
                document.getElementById('saveTargetInput').value = s ? s.target : 0;
                render(); 
            });
            document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
        };

        const updateMonthSelector = () => {
            const months = [...new Set(allData.map(d => d.date.slice(0,7)))];
            if(!months.includes(currentMonth)) months.push(currentMonth);
            months.sort().reverse();
            document.getElementById('monthSelect').innerHTML = months.map(m => `<option value="${m}" ${m===currentMonth?'selected':''}>${m}</option>`).join('');
            document.getElementById('fMember').innerHTML = members.map(m => `<option value="${m}">${m === '共同支出' ? '🏠 共同' : m}</option>`).join('');
            updateCategoryDropdown();
        };

        const render = () => {
            let estI = 0, estE = 0, actI = 0, actE = 0, totalAccBuffer = 0;
            const results = {}; members.forEach(m => results[m] = { 收入: {}, 支出: {} });
            const currentMonthData = allData.filter(d => d.date.startsWith(currentMonth));
            
            currentMonthData.forEach(d => {
                const target = results[d.member]; if(!target) return;
                const amt = Math.round(Number(d.amount)) || 0;
                if (d.type === '收入') { actI += amt; target.收入[d.category] = (target.收入[d.category] || 0) + amt; }
                else { actE += amt; target.支出[d.category] = (target.支出[d.category] || 0) + amt; }
            });

            // 緩衝金
            const allMonths = [...new Set([...allData.map(d => d.date.slice(0,7)), ...Object.values(allBudgets).map(b => b.month)])].sort();
            allMonths.forEach(m => {
                let mEstI = 0, mEstE = 0, mActI = 0, mActE = 0;
                allData.filter(d => d.date.startsWith(m)).forEach(d => { if(d.type==='收入') mActI += Math.round(Number(d.amount))||0; else mActE += Math.round(Number(d.amount))||0; });
                Object.values(allBudgets).filter(b => b.month === m && !b.isDeleted).forEach(b => { if(b.type==='收入') mEstI += Math.round(Number(b.amount))||0; else mEstE += Math.round(Number(b.amount))||0; });
                totalAccBuffer += (mEstI - mActI) - (mEstE - mActE);
            });

            let html = '';
            members.forEach(m => {
                let cardBody = '';
                const sections = [{t:'收入', k:'收入'}, {t:'支出', k:'支出'}];
                
                sections.forEach(s => {
                    let secEstSubtotal = 0;
                    let secActSubtotal = 0;
                    cardBody += `<div style="font-size:0.7rem; color:#999; margin-top:8px;">▼ ${s.t} (按住〓可排序)</div>`;
                    
                    const allPastCats = Object.values(allBudgets).filter(b => b.member === m && b.type === s.k && !b.isDeleted).map(b => b.category);
                    const cats = [...new Set([...(defMap[m] ? defMap[m][s.k] : []), ...allPastCats])];
                    
                    // 排序邏輯
                    cats.sort((a,b) => {
                        const orderA = Object.values(allBudgets).find(o => o.month === currentMonth && o.member === m && o.category === a)?.order ?? 999;
                        const orderB = Object.values(allBudgets).find(o => o.month === currentMonth && o.member === m && o.category === b)?.order ?? 999;
                        return orderA - orderB;
                    });

                    let itemsHtml = '';
                    cats.forEach(cat => {
                        const actSum = results[m][s.k][cat] || 0;
                        const budgetDoc = Object.values(allBudgets).find(b => b.month === currentMonth && b.member === m && b.category === cat);
                        if (budgetDoc?.isDeleted) return;

                        let estSum = budgetDoc?.amount;
                        if (estSum === undefined) {
                            const hist = Object.values(allBudgets).filter(b => b.member === m && b.category === cat && !b.isDeleted).sort((a,b) => b.month.localeCompare(a.month));
                            estSum = hist.length > 0 ? Number(hist[0].amount) || 0 : 0;
                        }
                        
                        secEstSubtotal += estSum;
                        secActSubtotal += actSum;
                        if(s.k === '收入') estI += estSum; else estE += estSum;

                        let colorClass = (s.k === '支出' && actSum > estSum) || (s.k === '收入' && actSum < estSum) ? 'budget-warning' : 'budget-safe';
                        itemsHtml += `<div class="item-row" data-cat="${cat}"><span class="handle">〓</span><div class="name-area"><span class="item-del-btn" onclick="deleteCategory('${m}','${s.k}','${cat}')">×</span><input type="text" class="cat-name-input" value="${cat}" onblur="saveBudget('${m}','${s.k}','${cat}','name',this.value)"></div><div class="val-container"><input type="number" class="input-box ${colorClass}" value="${estSum}" onfocus="this.select()" onblur="saveBudget('${m}','${s.k}','${cat}','amount',this.value)"><input type="number" class="input-box actual-input" value="${actSum}" onfocus="this.select()" onblur="saveActualDirect('${m}', '${s.k}', '${cat}', this.value, ${actSum})" onkeydown="if(event.key==='Enter') this.blur()"></div></div>`;
                    });

                    cardBody += `<div class="item-list" id="list-${m.replace(/\s+/g, '')}-${s.k}">${itemsHtml}</div>`;
                    // 【新增：小計列】
                    cardBody += `<div class="subtotal-row"><span class="subtotal-label">${s.t}小計:</span><div class="val-container" style="padding-right:2px;"><div class="input-box" style="border:none;background:transparent;">${secEstSubtotal.toLocaleString()}</div><div class="input-box" style="border:none;background:transparent;color:#1a73e8;">${secActSubtotal.toLocaleString()}</div></div></div>`;
                    cardBody += `<div class="inline-add-box"><input type="text" id="cAddCat-${m}-${s.k}" style="flex:2; border:1px solid #eee; border-radius:6px; padding:4px;" placeholder="新項目"><input type="number" id="cAddAmt-${m}-${s.k}" style="flex:1; border:1px solid #eee; border-radius:6px; padding:4px;" placeholder="預估" onfocus="this.select()"><button onclick="cardAddProject('${m}','${s.k}')" class="inline-add-btn">+</button></div>`;
                });
                html += `<div class="card"><div class="card-title">${m === '共同支出' ? '🏠 共同' : m}</div>${cardBody}</div>`;
            });
            document.getElementById('cardsContainer').innerHTML = html;
            document.getElementById('estBal').innerText = `NT$ ${Math.round(estI - estE).toLocaleString()}`;
            const curSave = Number(document.getElementById('saveTargetInput').value) || 0;
            const actBalTotal = Math.round(actI - actE - curSave);
            document.getElementById('actBal').innerText = `NT$ ${actBalTotal.toLocaleString()}`;
            document.getElementById('actBal').style.color = actBalTotal < 0 ? '#e74c3c' : '#27ae60';
            document.getElementById('accBal').innerText = `累計緩衝金: NT$ ${Math.round(totalAccBuffer).toLocaleString()}`;
            
            document.getElementById('historyTbody').innerHTML = currentMonthData.map(d => `<tr><td style="padding:8px 4px"><input type="date" class="history-date-input" value="${d.date}" onchange="saveDate('${d.id}', this.value)"></td><td style="font-weight:bold">${d.member.substring(0,2)}</td><td>${d.category}</td><td style="text-align:right;font-weight:bold">${Math.round(Number(d.amount)||0).toLocaleString()}</td><td><b onclick="delItem('${d.id}')" style="cursor:pointer;color:#ccc;padding:0 5px">×</b></td></tr>`).join('');

            // 初始化所有卡片的拖拽功能
            members.forEach(m => {
                ['收入', '支出'].forEach(type => {
                    const el = document.getElementById(`list-${m.replace(/\s+/g, '')}-${type}`);
                    if (el) {
                        Sortable.create(el, {
                            handle: '.handle',
                            animation: 150,
                            onEnd: function() {
                                const sorted = Array.from(el.children).map(row => row.getAttribute('data-cat'));
                                saveOrder(m, type, sorted);
                            }
                        });
                    }
                });
            });
        };

        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = Math.round(Number(document.getElementById('fAmt').value));
            await addDoc(collection(db, "expenses"), { date: document.getElementById('fDate').value, type: document.getElementById('fType').value, member: document.getElementById('fMember').value, category: document.getElementById('fCat').value, amount, timestamp: new Date() });
            document.getElementById('fAmt').value = '';
        });
        setup();
    </script>
</body>
</html>
