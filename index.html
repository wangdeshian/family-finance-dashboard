<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>請好好記帳 - 手機完美版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f4f6f8; margin: 0; padding: 10px; color: #333; }
        .dashboard-container { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 15px; display: flex; flex-direction: column; }
        .card-title { font-size: 1rem; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #f0f2f5; padding-bottom: 8px; color: #1a73e8; }
        
        .top-bar { background: #34495e; color: white; padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .month-nav { display: flex; align-items: center; gap: 5px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .top-bar select { padding: 6px; border-radius: 6px; border: none; font-size: 0.9rem; }

        /* 快速記帳：徹底修復手機跑版 */
        .form-section { border-top: 5px solid #1a73e8; }
        .form-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
        .form-group label { font-size: 0.75rem; font-weight: bold; color: #888; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; height: 44px; appearance: none; background-color: #fff; }
        
        /* 強制修正日期選擇器在 iOS 上的寬度 */
        input[type="date"] { min-width: 100% !important; display: block !important; visibility: visible !important; }

        .submit-btn { background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; height: 44px; width: 100%; margin-top: 10px; font-size: 1rem; }

        .middle-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .cat-name-input { border: none; background: transparent; font-weight: bold; font-size: 0.9rem; width: 90px; color: #555; }
        .val-container { display: flex; gap: 4px; align-items: center; }
        .input-box { width: 70px; border: 1px solid #e0e0e0; text-align: right; font-weight: bold; border-radius: 6px; padding: 6px; font-size: 0.85rem; }
        
        .budget-warning { color: #e74c3c !important; border-color: #ffcdd2 !important; background: #fff5f5 !important; }
        .budget-safe { color: #27ae60 !important; border-color: #c8e6c9 !important; background: #fafffa !important; }
        .actual-input { background: #f8f9fa; color: #333; }
        
        .del-btn { color: #ccc; cursor: pointer; margin-left: 5px; font-size: 1.1rem; }
        .item-del-btn { color: #ffbcbc; cursor: pointer; font-size: 1.1rem; margin-right: 5px; }

        /* 底部佈局修復：圓餅圖在手機改垂直 */
        .bottom-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; }
        .chart-box { display: flex; flex-direction: row; gap: 10px; justify-content: space-around; padding: 10px; min-height: 220px; }
        .chart-container { flex: 1; max-width: 180px; text-align: center; }
        .chart-label { font-size: 0.7rem; color: #666; margin-top: 4px; }

        .bal-card { padding: 15px; border-left: 8px solid #1a73e8; }
        .bal-row { display: flex; justify-content: space-between; margin-bottom: 4px; align-items: center; }
        .bal-label { font-size: 0.8rem; color: #666; }
        .bal-val { font-weight: bold; font-size: 0.95rem; }
        
        /* 累積緩衝金：手機大數值縮小字體防止溢出 */
        .acc-bal { color: #8e44ad; font-size: clamp(1.2rem, 5vw, 1.8rem); border-top: 1px solid #eee; padding-top: 8px; margin-top: 8px; word-break: break-all; }

        .history-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .history-table td { padding: 10px 5px; border-bottom: 1px solid #f0f2f5; }

        /* 行動端專屬 RWD 極致修正 */
        @media (max-width: 600px) {
            .form-grid { flex-direction: column; }
            .form-group { min-width: 100%; }
            .bottom-grid { grid-template-columns: 1fr; }
            .chart-box { flex-direction: column; align-items: center; height: auto; gap: 20px; }
            .chart-container { width: 100%; max-width: 200px; }
            .middle-section { grid-template-columns: 1fr; }
            .input-box { width: 65px; }
            .cat-name-input { width: 75px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="top-bar">
            <strong>🚀 請好好記帳</strong>
            <div class="month-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                <select id="monthSelect"></select>
                <button class="nav-btn" onclick="changeMonth(1)">▶</button>
            </div>
        </div>

        <div class="card form-section">
            <div class="card-title">快速流水帳登記</div>
            <form id="mainForm" class="form-grid">
                <div class="form-group"><label>日期</label><input type="date" id="fDate" required></div>
                <div class="form-group"><label>收支</label><select id="fType"><option value="支出">支出</option><option value="收入">收入</option></select></div>
                <div class="form-group"><label>成員</label><select id="fMember" onchange="updateCategoryDropdown()"></select></div>
                <div class="form-group"><label>分類</label><select id="fCat" required></select></div>
                <div class="form-group"><label>金額</label><input type="number" id="fAmt" required></div>
                <button type="submit" class="submit-btn">儲存流水帳</button>
            </form>
        </div>

        <div class="middle-section" id="cardsContainer"></div>

        <div class="bottom-grid">
            <div class="card chart-box">
                <div class="chart-container"><canvas id="pieBudget"></canvas><div class="chart-label">預估支出</div></div>
                <div class="chart-container"><canvas id="pieActual"></canvas><div class="chart-label">實際支出</div></div>
            </div>
            <div class="card bal-card">
                <div class="bal-row"><span class="bal-label">本月預估節餘</span><span class="bal-val" id="estBal">0</span></div>
                <div class="bal-row"><span class="bal-label">本月實際結餘</span><span class="bal-val" id="actBal">0</span></div>
                <div class="bal-row" style="flex-direction: column; align-items: flex-start;">
                    <span class="bal-label" style="margin-top:5px;">累積緩衝金 (待付累計)</span>
                    <span class="bal-val acc-bal" id="accBal">NT$ 0</span>
                </div>
            </div>
        </div>

        <div class="card" style="min-height: auto;"><div class="card-title" id="historyTitle">流水帳紀錄</div><div style="overflow-x:auto"><table class="history-table"><tbody id="historyTbody"></tbody></table></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, deleteDoc, updateDoc, setDoc, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDiatcf67zBQFDe47O0zQqwk9blNFP3Y7Q",
            authDomain: "family-finance-f4077.firebaseapp.com",
            projectId: "family-finance-f4077",
            storageBucket: "family-finance-f4077.firebasestorage.app",
            messagingSenderId: "533199869020",
            appId: "1:533199869020:web:ea1e55d11f2c643cd44299",
            measurementId: "G-1WEX2WN56Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let pieB, pieA, allData = [], allBudgets = {}, currentMonth = new Date().toISOString().slice(0,7);
        const members = ['共同支出','爸爸','媽媽','姐姐','弟弟'];

        const initCharts = () => {
            const opt = { plugins: { legend: { display: false } }, maintainAspectRatio: true };
            pieB = new Chart(document.getElementById('pieBudget').getContext('2d'), { type: 'pie', data: { labels: [], datasets: [{ data: [], backgroundColor: ['#3498db','#e74c3c','#f1c40f','#2ecc71','#9b59b6','#ff9f40'] }] }, options: opt });
            pieA = new Chart(document.getElementById('pieActual').getContext('2d'), { type: 'pie', data: { labels: [], datasets: [{ data: [], backgroundColor: ['#3498db','#e74c3c','#f1c40f','#2ecc71','#9b59b6','#ff9f40'] }] }, options: opt });
        };
        initCharts();

        window.saveDate = async (id, newDate) => { if (id && newDate) await updateDoc(doc(db, "expenses", id), { date: newDate }); };
        window.saveBudget = async (member, type, category, field, value) => {
            const budgetId = `${currentMonth}_${member}_${category}`;
            await setDoc(doc(db, "budgets", budgetId), { month: currentMonth, member, type, category, amount: field==='amount'?Number(value)||0:value }, { merge: true });
        };

        window.deleteCategory = async (member, type, category) => {
            if (!confirm(`確定刪除「${category}」？相關流水帳也將被移除。`)) return;
            await deleteDoc(doc(db, "budgets", `${currentMonth}_${member}_${category}`));
            const q = query(collection(db, "expenses"), where("member", "==", member), where("type", "==", type), where("category", "==", category));
            const snap = await getDocs(q);
            const promises = snap.docs.filter(d => d.data().date.startsWith(currentMonth)).map(d => deleteDoc(doc(db, "expenses", d.id)));
            await Promise.all(promises);
        };

        window.saveActual = async (id, member, type, category, newVal) => {
            const val = Number(newVal) || 0;
            if (id) await updateDoc(doc(db, "expenses", id), { amount: val });
            else if (val > 0) await addDoc(collection(db, "expenses"), { date: `${currentMonth}-01`, member, type, category, amount: val, timestamp: new Date() });
        };

        window.changeMonth = (offset) => {
            let [y, m] = currentMonth.split('-').map(Number);
            m += offset; if (m > 12) { y++; m = 1; } if (m < 1) { y--; m = 12; }
            currentMonth = `${y}-${String(m).padStart(2, '0')}`;
            render(); updateMonthSelector();
        };

        const setup = () => {
            onSnapshot(query(collection(db, "budgets")), (snap) => { allBudgets = {}; snap.forEach(d => allBudgets[d.id] = d.data()); render(); });
            onSnapshot(query(collection(db, "expenses"), orderBy("date", "desc")), (snap) => { allData = []; snap.forEach(d => allData.push({ id: d.id, ...d.data() })); updateMonthSelector(); render(); });
        };

        const updateMonthSelector = () => {
            const months = [...new Set(allData.map(d => d.date.slice(0,7)))];
            if(!months.includes(currentMonth)) months.push(currentMonth);
            months.sort().reverse();
            document.getElementById('monthSelect').innerHTML = months.map(m => `<option value="${m}" ${m===currentMonth?'selected':''}>${m}</option>`).join('');
            document.getElementById('fMember').innerHTML = members.map(m => `<option value="${m}">${m === '共同支出' ? '🏠 共同' : m}</option>`).join('');
            updateCategoryDropdown();
        };

        window.updateCategoryDropdown = () => {
            const m = document.getElementById('fMember').value;
            const t = document.getElementById('fType').value;
            const dynamicCats = Object.values(allBudgets).filter(b => b.month === currentMonth && b.member === m && b.type === t).map(b => b.category);
            const defMap = {
                '爸爸': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '媽媽': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '姐姐': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '弟弟': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '共同支出': { 收入: ['獎金','利息'], 支出: ['房租','水電瓦斯','第四台','車位租金','其他'] }
            };
            const finalCats = [...new Set([...(defMap[m][t] || []), ...dynamicCats])];
            document.getElementById('fCat').innerHTML = finalCats.map(c => `<option value="${c}">${c}</option>`).join('');
        };

        const render = () => {
            let estI = 0, estE = 0, actI = 0, actE = 0, pieBudData = {}, pieActData = {}, totalAccBuffer = 0;
            const results = {}; members.forEach(m => results[m] = { 收入: {}, 支出: {} });
            const currentMonthData = allData.filter(d => d.date.startsWith(currentMonth));
            currentMonthData.forEach(d => {
                const target = results[d.member]; if(!target) return;
                const amt = Number(d.amount) || 0;
                if (d.type === '收入') { actI += amt; (target.收入[d.category] = target.收入[d.category] || []).push({id: d.id, v: amt}); }
                else { actE += amt; (target.支出[d.category] = target.支出[d.category] || []).push({id: d.id, v: amt}); pieActData[d.category] = (pieActData[d.category] || 0) + amt; }
            });

            // 累積緩衝金計算：防呆 NaN
            const allMonths = [...new Set([...allData.map(d => d.date.slice(0,7)), ...Object.values(allBudgets).map(b => b.month)])].sort();
            allMonths.forEach(m => {
                let mEstI = 0, mEstE = 0, mActI = 0, mActE = 0;
                allData.filter(d => d.date.startsWith(m)).forEach(d => { if(d.type==='收入') mActI += Number(d.amount)||0; else mActE += Number(d.amount)||0; });
                Object.values(allBudgets).filter(b => b.month === m).forEach(b => { if(b.type==='收入') mEstI += Number(b.amount)||0; else mEstE += Number(b.amount)||0; });
                totalAccBuffer += (mEstI - mActI) - (mEstE - mActE);
            });

            let html = '';
            const defMap = {
                '爸爸': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '媽媽': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '姐姐': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '弟弟': { 收入: ['薪資','股票','投資'], 支出: ['貸款','信用卡','私人','加油費','學費'] },
                '共同支出': { 收入: ['獎金','利息'], 支出: ['房租','水電瓦斯','第四台','車位租金','其他'] }
            };

            members.forEach(m => {
                let items = '';
                const sections = [{t:'收入', k:'收入', c:'income-text'}, {t:'支出', k:'支出', c:'expense-text'}];
                sections.forEach(s => {
                    items += `<div class="${s.c}">▼ ${s.t} (預估 / 實際)</div>`;
                    const cats = [...new Set([...(defMap[m][s.k] || []), ...Object.values(allBudgets).filter(b=>b.member===m && b.type===s.k).map(b=>b.category)])];
                    cats.forEach(cat => {
                        const logs = results[m][s.k][cat] || [];
                        const actSum = logs.reduce((a,b)=>a+(Number(b.v)||0), 0);
                        const bId = `${currentMonth}_${m}_${cat}`;
                        let estSum = allBudgets[bId]?.amount;
                        if (estSum === undefined) {
                            const hist = Object.values(allBudgets).filter(b => b.member === m && b.category === cat).sort((a,b) => b.month.localeCompare(a.month));
                            estSum = hist.length > 0 ? Number(hist[0].amount) || 0 : 0;
                        }
                        if(s.k === '收入') estI += estSum; else { estE += estSum; pieBudData[cat] = (pieBudData[cat] || 0) + estSum; }
                        let colorClass = (s.k === '支出' && actSum > estSum) || (s.k === '收入' && actSum < estSum) ? 'budget-warning' : 'budget-safe';
                        items += `
                            <div class="item-row">
                                <div><span class="item-del-btn" onclick="deleteCategory('${m}','${s.k}','${cat}')">×</span><input type="text" class="cat-name-input" value="${cat}" onblur="saveBudget('${m}','${s.k}','${cat}','name',this.value)"></div>
                                <div class="val-container">
                                    <input type="number" class="input-box ${colorClass}" value="${estSum}" onblur="saveBudget('${m}','${s.k}','${cat}','amount',this.value)">
                                    <input type="number" class="input-box actual-input" value="${actSum}" onblur="saveActual('${logs[0]?.id || ''}', '${m}', '${s.k}', '${cat}', this.value)">
                                    ${logs.length > 0 ? `<b class="del-btn" onclick="delItem('${logs[0].id}')">×</b>` : ''}
                                </div>
                            </div>`;
                    });
                    items += `<div style="margin-top:8px; display:flex; gap:5px;"><input type="text" id="cAddCat-${m}-${s.k}" placeholder="自訂${s.t}" style="flex:2; padding:8px; border:1px solid #eee; border-radius:6px; font-size:0.8rem;"><input type="number" id="cAddAmt-${m}-${s.k}" placeholder="預估" style="flex:1; padding:8px; border:1px solid #eee; border-radius:6px; font-size:0.8rem;"><button onclick="saveBudget('${m}','${s.k}', document.getElementById('cAddCat-${m}-${s.k}').value, 'amount', document.getElementById('cAddAmt-${m}-${s.k}').value)" style="background:#eee; border:none; border-radius:6px; padding:0 12px; cursor:pointer;">加</button></div>`;
                });
                html += `<div class="card"><div class="card-title">${m === '共同支出' ? '🏠 共同收入/支出' : m}</div>${items}</div>`;
            });
            document.getElementById('cardsContainer').innerHTML = html;
            document.getElementById('estBal').innerText = `NT$ ${(Number(estI - estE)||0).toLocaleString()}`;
            document.getElementById('actBal').innerText = `NT$ ${(Number(actI - actE)||0).toLocaleString()}`;
            document.getElementById('accBal').innerText = `NT$ ${(Number(totalAccBuffer)||0).toLocaleString()}`;
            document.getElementById('historyTbody').innerHTML = currentMonthData.map(d => `<tr><td style="padding:10px 0"><input type="date" style="border:none;background:transparent;width:115px;" value="${d.date}" onchange="saveDate('${d.id}', this.value)"></td><td>${d.member.slice(0,2)}</td><td>${d.category}</td><td style="text-align:right"><b>${(Number(d.amount)||0).toLocaleString()}</b></td><td><b class="del-btn" onclick="delItem('${d.id}')">×</b></td></tr>`).join('');
            pieB.data.labels = Object.keys(pieBudData); pieB.data.datasets[0].data = Object.values(pieBudData); pieB.update();
            pieA.data.labels = Object.keys(pieActData); pieA.data.datasets[0].data = Object.values(pieActData); pieA.update();
            updateCategoryDropdown();
        };

        window.delItem = async (id) => { if(confirm("確定刪除這筆紀錄？")) await deleteDoc(doc(db, "expenses", id)); };
        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "expenses"), { date: document.getElementById('fDate').value, type: document.getElementById('fType').value, member: document.getElementById('fMember').value, category: document.getElementById('fCat').value, amount: Number(document.getElementById('fAmt').value), timestamp: new Date() });
            document.getElementById('fAmt').value = '';
        });
        setup();
    </script>
</body>
</html>
