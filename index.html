<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>請好好記帳 - 資料救援版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f4f6f8; margin: 0; padding: 8px; color: #333; overflow-x: hidden; width: 100vw; }
        .dashboard-container { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 10px; display: flex; flex-direction: column; }
        .card-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; border-bottom: 2px solid #f0f2f5; padding-bottom: 6px; color: #1a73e8; }
        .top-bar { background: #34495e; color: white; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; z-index: 100; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .month-nav { display: flex; align-items: center; gap: 4px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .month-select-style { padding: 5px; border-radius: 6px; border: none; font-size: 0.85rem; background: #fff; color: #333; font-weight: bold; }
        .save-target-row { display: flex; align-items: center; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; gap: 8px; justify-content: center; }
        .save-input { width: 100px; background: #fff; border: none; border-radius: 4px; padding: 4px 8px; font-weight: bold; text-align: right; color: #2c3e50; }
        
        .middle-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #eee; gap: 4px; background: #fff; }
        .handle { color: #ddd; cursor: grab; padding: 0 4px; }
        
        .name-area { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .cat-name-input { border: none; background: transparent; font-weight: bold; font-size: 0.85rem; color: #555; outline: none; }
        .pocket-info { font-size: 0.6rem; color: #8e44ad; font-weight: bold; }
        
        .val-container { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
        .input-box { width: 62px; border: 1px solid #e0e0e0; text-align: right; font-weight: bold; border-radius: 6px; padding: 4px; font-size: 0.8rem; }
        
        .budget-warning { color: #e74c3c !important; background: #fff5f5 !important; }
        .budget-safe { color: #27ae60 !important; background: #fafffa !important; }
        .actual-input { background: #f8f9fa; color: #333; }

        .subtotal-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.75rem; color: #777; background: #fcfcfc; border-bottom: 1px solid #eee; }
        .inline-add-box { margin-top: 8px; display: flex; gap: 4px; width: 100%; align-items: center; }
        .inline-add-name { flex: 2; min-width: 0; border: 1px solid #eee; border-radius: 8px; padding: 8px; font-size: 0.8rem; }
        .inline-add-amt { flex: 1; min-width: 0; border: 1px solid #eee; border-radius: 8px; padding: 8px; font-size: 0.8rem; text-align: right; }
        .inline-add-btn { background: #1a73e8; border: none; border-radius: 8px; width: 36px; height: 36px; color: white; cursor: pointer; flex-shrink: 0; font-size: 1.2rem; }

        .summary-card { text-align: center; padding: 15px; }
        .history-table { width:100%; border-collapse:collapse; font-size:0.75rem; }
        @media (max-width: 600px) { .input-box { width: 58px; } }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="top-bar">
            <div class="top-row">
                <strong>🚀 數位信封記帳</strong>
                <div class="month-nav">
                    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                    <select id="monthSelect" class="month-select-style" onchange="currentMonth = this.value; render();"></select>
                    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
            </div>
            <div class="save-target-row">
                <span>💰 本月固定存款目標：</span>
                <input type="number" id="saveTargetInput" class="save-input" onfocus="this.select()" onblur="updateSaveTarget(this.value)">
            </div>
        </div>

        <div class="card form-section">
            <div class="card-title">快速流水帳登記</div>
            <form id="mainForm" class="form-grid">
                <div class="form-group"><label>日期</label><input type="date" id="fDate" required></div>
                <div class="form-group"><label>收支</label><select id="fType" onchange="updateCategoryDropdown()"><option value="支出">支出</option><option value="收入">收入</option></select></div>
                <div class="form-group"><label>成員</label><select id="fMember" onchange="updateCategoryDropdown()"></select></div>
                <div class="form-group"><label>分類</label><select id="fCat" required></select></div>
                <div class="form-group"><label>金額</label><input type="number" id="fAmt" onfocus="this.select()" required></div>
                <button type="submit" class="submit-btn">儲存紀錄</button>
            </form>
        </div>

        <div class="middle-section" id="cardsContainer"></div>

        <div class="card summary-card">
            <div style="display:flex; justify-content: space-around;">
                <div><div style="font-size:0.7rem; color:#888;">預算剩餘</div><div id="estBal" style="font-weight:bold; font-size:1.1rem;">0</div></div>
                <div><div style="font-size:0.7rem; color:#888;">手頭餘額</div><div id="actBal" style="font-weight:bold; font-size:1.1rem; color:#1a73e8;">0</div></div>
            </div>
        </div>

        <div class="card" style="min-height: auto;"><div class="card-title">流水帳紀錄</div><div style="overflow-x:auto"><table class="history-table"><tbody id="historyTbody"></tbody></table></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, deleteDoc, updateDoc, setDoc, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDiatcf67zBQFDe47O0zQqwk9blNFP3Y7Q",
            authDomain: "family-finance-f4077.firebaseapp.com",
            projectId: "family-finance-f4077",
            storageBucket: "family-finance-f4077.firebasestorage.app",
            messagingSenderId: "533199869020",
            appId: "1:533199869020:web:ea1e55d11f2c643cd44299",
            measurementId: "G-1WEX2WN56Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allData = [], allBudgets = {}, currentMonth = new Date().toISOString().slice(0,7);
        let isEditing = false;
        const members = ['共同支出','王得賢','蔡書瑜','王婕恩','王予陽'];
        const defMap = { '王得賢': { 收入: ['薪資','股票'], 支出: ['貸款','信用卡','私人','加油費','學費'] }, '蔡書瑜': { 收入: ['薪資'], 支出: ['貸款','信用卡','私人','加油費','學費'] }, '王婕恩': { 支出: ['學費'] }, '王予陽': { 支出: ['學費'] }, '共同支出': { 收入: ['獎金'], 支出: ['房租','水電瓦斯','其他'] } };

        window.updateCategoryDropdown = () => {
            const m = document.getElementById('fMember').value;
            const t = document.getElementById('fType').value;
            const dynamicCats = Object.values(allBudgets).filter(b => b.member === m && b.type === t && !b.isDeleted).map(b => b.category);
            const finalCats = [...new Set([...(defMap[m]?.[t] || []), ...dynamicCats])];
            document.getElementById('fCat').innerHTML = finalCats.map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.deleteCategory = async (member, type, category, ask = true) => {
            if (ask && !confirm(`確定從「${currentMonth}」移除「${category}」？`)) return;
            const budgetId = `${currentMonth}_${member}_${category}`;
            await setDoc(doc(db, "budgets", budgetId), { month: currentMonth, member, type, category, amount: 0, isDeleted: true }, { merge: true });
        };

        // 【資料救援核心】手動新增項目時，強制將 isDeleted 設為 false
        window.saveBudget = async (member, type, category, field, value) => {
            isEditing = false;
            const budgetId = `${currentMonth}_${member}_${category}`;
            const numVal = Math.round(Number(value)) || 0;
            if (field === 'amount' && numVal === 0) {
                await deleteCategory(member, type, category, false);
            } else {
                // 手動更新時，一定要把 isDeleted 寫回 false，否則加不回來
                await setDoc(doc(db, "budgets", budgetId), { 
                    month: currentMonth, member, type, category, 
                    [field === 'amount' ? 'amount' : 'category']: field === 'amount' ? numVal : value, 
                    isDeleted: false 
                }, { merge: true });
            }
        };

        window.saveActualDirect = async (member, type, category, newVal, currentSum) => {
            isEditing = false;
            const val = Math.round(Number(newVal)) || 0;
            if (val === currentSum) return;
            const diff = val - currentSum;
            await addDoc(collection(db, "expenses"), { date: new Date().toISOString().slice(0, 10), type, member, category, amount: diff, timestamp: new Date() });
        };

        window.cardAddProject = async (m, t) => {
            const nameEl = document.getElementById(`cAddCat-${m}-${t}`);
            const amtEl = document.getElementById(`cAddAmt-${m}-${t}`);
            if (!nameEl.value) return;
            // 這裡呼叫 saveBudget，它現在會強制撕掉 isDeleted 標籤
            await saveBudget(m, t, nameEl.value, 'amount', amtEl.value || 0);
            nameEl.value = ''; amtEl.value = '';
        };

        window.saveOrder = async (member, type, sortedArray) => {
            const promises = sortedArray.map((cat, index) => setDoc(doc(db, "budgets", `${currentMonth}_${member}_${cat}`), { order: index }, { merge: true }));
            await Promise.all(promises);
        };

        window.saveDate = async (id, newDate) => { if (id && newDate) await updateDoc(doc(db, "expenses", id), { date: newDate }); };
        window.delItem = async (id) => { if(confirm("確定刪除？")) await deleteDoc(doc(db, "expenses", id)); };
        window.changeMonth = (offset) => { let [y, m] = currentMonth.split('-').map(Number); m += offset; if (m > 12) { y++; m = 1; } if (m < 1) { y--; m = 12; } currentMonth = `${y}-${String(m).padStart(2, '0')}`; render(); updateMonthSelector(); };
        window.updateSaveTarget = async (v) => { await setDoc(doc(db, "settings", `${currentMonth}_save`), { month: currentMonth, target: Number(v) || 0 }); };

        const setup = () => {
            onSnapshot(query(collection(db, "budgets")), (snap) => { allBudgets = {}; snap.forEach(d => allBudgets[d.id] = d.data()); if(!isEditing) render(); updateCategoryDropdown(); });
            onSnapshot(query(collection(db, "expenses"), orderBy("date", "desc")), (snap) => { allData = []; snap.forEach(d => allData.push({ id: d.id, ...d.data() })); updateMonthSelector(); if(!isEditing) render(); });
            onSnapshot(query(collection(db, "settings")), (snap) => { render(); });
            document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
        };

        const updateMonthSelector = () => {
            const months = [...new Set(allData.map(d => d.date.slice(0,7)))]; if(!months.includes(currentMonth)) months.push(currentMonth);
            months.sort().reverse(); document.getElementById('monthSelect').innerHTML = months.map(m => `<option value="${m}" ${m===currentMonth?'selected':''}>${m}</option>`).join('');
            document.getElementById('fMember').innerHTML = members.map(m => `<option value="${m}">${m === '共同支出' ? '🏠 共同' : m}</option>`).join('');
            updateCategoryDropdown();
        };

        const render = async () => {
            if(isEditing) return;
            let estI = 0, estE = 0, actI = 0, actE = 0;
            const results = {}; members.forEach(m => results[m] = { 收入: {}, 支出: {} });
            allData.filter(d => d.date.startsWith(currentMonth)).forEach(d => {
                const target = results[d.member]; if(!target) return;
                const amt = Math.round(Number(d.amount)) || 0;
                if (d.type === '收入') { actI += amt; target.收入[d.category] = (target.收入[d.category] || 0) + amt; }
                else { actE += amt; target.支出[d.category] = (target.支出[d.category] || 0) + amt; }
            });

            // 信封邏輯
            const pocketBalances = {};
            allData.forEach(d => { const k = `${d.member}_${d.type}_${d.category}`; pocketBalances[k] = (pocketBalances[k] || 0) - (d.type === '支出' ? Number(d.amount) : -Number(d.amount)); });
            Object.values(allBudgets).filter(b => !b.isDeleted).forEach(b => { const k = `${b.member}_${b.type}_${b.category}`; pocketBalances[k] = (pocketBalances[k] || 0) + (b.type === '支出' ? Number(b.amount) : -Number(b.amount)); });

            const settingsSnap = await getDocs(collection(db, "settings"));
            const saveTarget = settingsSnap.docs.find(d => d.id === `${currentMonth}_save`)?.data()?.target || 0;
            document.getElementById('saveTargetInput').value = saveTarget;

            let html = '';
            members.forEach(m => {
                let cardBody = '';
                ['收入','支出'].forEach(k => {
                    let sEst = 0, sAct = 0;
                    const cats = [...new Set([...(defMap[m]?.[k] || []), ...Object.values(allBudgets).filter(b => b.member === m && b.type === k && !b.isDeleted).map(b => b.category)])];
                    
                    cats.sort((a,b) => {
                        const oA = Object.values(allBudgets).find(o => o.month === currentMonth && o.member === m && o.category === a)?.order ?? 999;
                        const oB = Object.values(allBudgets).find(o => o.month === currentMonth && o.member === m && o.category === b)?.order ?? 999;
                        return oA - oB;
                    });

                    let itemsHtml = '';
                    cats.forEach(cat => {
                        const bDoc = Object.values(allBudgets).find(b => b.month === currentMonth && b.member === m && b.category === cat);
                        if (bDoc?.isDeleted) return;
                        const aSum = results[m][k][cat] || 0;
                        let eSum = bDoc?.amount;
                        if (eSum === undefined) { const h = Object.values(allBudgets).filter(b => b.member === m && b.category === cat && !b.isDeleted).sort((a,b) => b.month.localeCompare(a.month)); eSum = h.length > 0 ? Number(h[0].amount) || 0 : 0; }
                        sEst += eSum; sAct += aSum;
                        if(k === '收入') estI += eSum; else estE += eSum;
                        const pVal = Math.round(pocketBalances[`${m}_${k}_${cat}`] || 0);
                        let colorClass = (k === '支出' && aSum > eSum) ? 'budget-warning' : 'budget-safe';
                        itemsHtml += `<div class="item-row" data-cat="${cat}"><span class="handle">〓</span><div class="name-area"><input type="text" class="cat-name-input" value="${cat}" onblur="saveBudget('${m}','${k}','${cat}','name',this.value)"><span class="pocket-info">存留: ${pVal.toLocaleString()}</span></div><div class="val-container"><input type="number" class="input-box ${colorClass}" value="${eSum}" onfocus="isEditing=true;this.select()" onblur="saveBudget('${m}','${k}','${cat}','amount',this.value)"><input type="number" class="input-box actual-input" value="${aSum}" onfocus="isEditing=true;this.select()" onblur="saveActualDirect('${m}', '${k}', '${cat}', this.value, ${aSum})"><span class="item-del-btn" onclick="deleteCategory('${m}','${k}','${cat}')">×</span></div></div>`;
                    });
                    cardBody += `<div id="list-${m.replace(/\s+/g, '')}-${k}">${itemsHtml}</div>`;
                    cardBody += `<div class="subtotal-row"><span style="padding-left:28px">${k}合計:</span><div class="val-container"><div class="input-box" style="border:none;background:transparent">${sEst.toLocaleString()}</div><div class="input-box" style="border:none;background:transparent;color:#1a73e8">${sAct.toLocaleString()}</div></div></div>`;
                    cardBody += `<div class="inline-add-box"><input type="text" id="cAddCat-${m}-${k}" class="inline-add-name" placeholder="加${k}項目..."><input type="number" id="cAddAmt-${m}-${k}" class="inline-add-amt" placeholder="預估"><button onclick="cardAddProject('${m}','${k}')" class="inline-add-btn">+</button></div>`;
                });
                html += `<div class="card"><div class="card-title">${m}</div>${cardBody}</div>`;
            });
            document.getElementById('cardsContainer').innerHTML = html;
            document.getElementById('estBal').innerText = `NT$ ${Math.round(estI - estE).toLocaleString()}`;
            document.getElementById('actBal').innerText = `NT$ ${Math.round(actI - actE - saveTarget).toLocaleString()}`;
            document.getElementById('historyTbody').innerHTML = allData.filter(d => d.date.startsWith(currentMonth)).map(d => `<tr><td style="padding:8px 4px">${d.date.slice(5)}</td><td>${d.member.substring(0,2)}</td><td>${d.category}</td><td style="text-align:right"><b>${Math.round(Number(d.amount)||0).toLocaleString()}</b></td><td><b onclick="delItem('${d.id}')" style="cursor:pointer;color:#ccc;padding:0 5px">×</b></td></tr>`).join('');
            members.forEach(m => ['收入','支出'].forEach(t => { const el = document.getElementById(`list-${m.replace(/\s+/g, '')}-${t}`); if(el) Sortable.create(el, { handle:'.handle', animation:150, onEnd:()=>saveOrder(m,t,Array.from(el.children).map(r=>r.getAttribute('data-cat'))) }); }));
        };

        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "expenses"), { date: document.getElementById('fDate').value, type: document.getElementById('fType').value, member: document.getElementById('fMember').value, category: document.getElementById('fCat').value, amount: Math.round(Number(document.getElementById('fAmt').value)), timestamp: new Date() });
            document.getElementById('fAmt').value = '';
        });
        setup();
    </script>
</body>
</html>
